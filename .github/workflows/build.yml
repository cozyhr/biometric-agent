name: build

on:
  push:
    tags: ["agent-v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset: cozyhr-biometric-sync-macos
          - os: windows-latest
            asset: cozyhr-biometric-sync-windows.exe
          - os: ubuntu-latest
            asset: cozyhr-biometric-sync-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tk (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk
      - name: Install deps
        run: python -m pip install --upgrade pip pyinstaller pyzk requests
      - name: Build
        run: pyinstaller --onefile --windowed --name "${{ matrix.asset }}" cozyhr_biometric_desktop.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
